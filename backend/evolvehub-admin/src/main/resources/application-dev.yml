# ==============================================================
# EvolveHub Admin Service - Development Profile
# ==============================================================
server:
  port: 8083

spring:
  # ----- DataSource (local PostgreSQL) -----
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/evolve_admin
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

# ----- Logging (development: show SQL) -----
logging:
  level:
    org.evolve: DEBUG
    com.baomidou.mybatisplus: DEBUG
