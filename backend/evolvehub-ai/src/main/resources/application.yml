# ==============================================================
# EvolveHub AI Platform - Base Configuration
# ==============================================================
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: evolvehub-ai

# ----- MyBatis-Plus -----
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# ----- Actuator -----
management:
  endpoints:
    web:
      exposure:
        include: health,info
